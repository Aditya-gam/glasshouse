<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>State primitives · Inference Exposure Auditor</title>

<script>
  (function () {
    try {
      var t = localStorage.getItem('iea_theme');
      if (!t) t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      if (t === 'dark') document.documentElement.classList.add('dark');
    } catch (e) {}
  })();
</script>

<link rel="stylesheet" href="_ds/aditya-design-system-25de1704-6fd7-4a46-907e-3af1dff6c2fd/styles.css">
<link rel="stylesheet" href="styles/app.css">
<link rel="stylesheet" href="styles/dashboard.css">
<link rel="stylesheet" href="styles/states.css">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="_ds/aditya-design-system-25de1704-6fd7-4a46-907e-3af1dff6c2fd/_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="js/icons.jsx"></script>
<script type="text/babel" src="js/states.jsx"></script>
<script type="text/babel">
const { useState, useEffect } = React;
const Icon = window.Icon;
const DS = window.AdityaDesignSystem_25de17;
const { EmptyState, ErrorState, RunProgress, SkelCard, SkelChart, SkelRow, SkelGrid } = window.States;

function useTheme() {
  const [t, setT] = useState(() => { try { return localStorage.getItem("iea_theme") || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"); } catch (e) { return "light"; } });
  useEffect(() => { document.documentElement.classList.toggle("dark", t === "dark"); try { localStorage.setItem("iea_theme", t); } catch (e) {} }, [t]);
  return [t, setT];
}

function Showcase() {
  const [theme, setTheme] = useTheme();
  return (
    <div className="states-page">
      <header className="states-bar">
        <a className="brand brand-link" href="Dashboard.html" aria-label="Inference Exposure Auditor">
          <span className="brand-mark"><Icon name="scan" size={18} /></span>
          <span className="brand-text"><span className="brand-name">Inference Exposure Auditor</span></span>
        </a>
        <span style={{ marginLeft: "auto" }} />
        <DS.IconButton variant="solid" aria-label={theme === "dark" ? "Switch to light mode" : "Switch to dark mode"} onClick={() => setTheme(theme === "dark" ? "light" : "dark")}>
          <Icon name={theme === "dark" ? "sun" : "moon"} size={18} />
        </DS.IconButton>
      </header>

      <main className="states-wrap">
        <div className="states-intro">
          <h1>Honest states</h1>
          <p>The shared primitives every data screen reuses — so loading, empty, error, and long-running cases are designed, not improvised. Calm by construction: error is never a red alert, and "abstained / no signal" is a first-class result, not a failure.</p>
        </div>

        {/* Skeleton */}
        <section className="spec">
          <div className="spec-label"><span className="spec-num">01</span><h2>Skeleton</h2></div>
          <p className="spec-desc">Placeholders that mirror the real layout, so content doesn't jump in. Pulses gently and respects <code>prefers-reduced-motion</code>.</p>
          <div className="spec-frame">
            <SkelGrid n={3} />
            <div style={{ marginTop: "16px" }}><SkelChart /></div>
          </div>
        </section>

        {/* EmptyState */}
        <section className="spec">
          <div className="spec-label"><span className="spec-num">02</span><h2>Empty state</h2></div>
          <p className="spec-desc">Centered, plain, and never alarmist — a soft icon, one clear line, an optional second line, and a single teal action.</p>
          <div className="spec-frame">
            <div className="spec-split">
              <div>
                <EmptyState icon="inbox" title="Nothing to analyze yet" message="Connect a read-only account or upload an export, and we'll show you what an AI can infer." action="Connect or import" actionHref="Connect.html" />
                <div className="spec-caption">No footprint yet</div>
              </div>
              <div>
                <EmptyState icon="shield-check" title="We couldn't infer anything" message="Good news, honestly — your current footprint gave the engine no reliable signal to work with." message2="Every attribute came back “abstained — no signal.”" />
                <div className="spec-caption">All-abstained (framed as good news)</div>
              </div>
            </div>
          </div>
        </section>

        {/* ErrorState */}
        <section className="spec">
          <div className="spec-label"><span className="spec-num">03</span><h2>Error state</h2></div>
          <p className="spec-desc">Calm, not a red alert — a muted icon, what happened in plain words, a "try again", and a quiet details affordance. No stack traces.</p>
          <div className="spec-frame">
            <ErrorState
              title="We couldn't reach the engine"
              message="The audit didn't finish — this is almost always a temporary connection issue, not your data."
              onRetry={() => {}}
              retryLabel="Re-run audit"
              details={"request_id: run_3b2c9f\nstage: infer\nreason: upstream timeout (504) after 30s"}
            />
          </div>
        </section>

        {/* RunProgress */}
        <section className="spec">
          <div className="spec-label"><span className="spec-num">04</span><h2>Run progress</h2></div>
          <p className="spec-desc">For async runs that stream live stages over SSE. Named stages, the current one, a cancel, and a calm "this takes a moment" line — and it stays honest if the stream drops, falling back to polling.</p>
          <div className="spec-frame">
            <div className="spec-split">
              <div>
                <RunProgress title="Running your audit" stages={["Retrieve", "Infer", "Calibrate"]} current={1} status="running" onCancel={() => {}} />
                <div className="spec-caption">Live (SSE) · stage 2 of 3</div>
              </div>
              <div>
                <RunProgress title="Proving the rewrite" stages={["Minimal set", "Draft edits", "Re-attack & prove"]} current={2} status="polling" hint="The live stream dropped — we switched to polling and your run keeps going." onCancel={() => {}} />
                <div className="spec-caption">Stream dropped → polling fallback</div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Showcase />);
</script>
</body>
</html>
